version: "3.8"

services:
  scraper:
    build: ./scraper
    depends_on:
      - db
    volumes:
      - ./scraper:/app
    command: ["python", "main.py"]

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: price_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
