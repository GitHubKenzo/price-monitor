services:
  scraper:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: price-monitor-scraper
    working_dir: /workspace

    environment:
      - TZ=Asia/Tokyo
      - DB_PATH=/workspace/data/price.db
      - PYTHONPATH=/workspace

    volumes:
      - ../data:/workspace/data

    command: python -m app.main