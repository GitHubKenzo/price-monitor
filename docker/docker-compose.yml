version: "3.8"

services:
  scraper:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: price-monitor-scraper
    volumes:
      - ../app:/app
      - ../data:/app/data
    environment:
      - TZ=Asia/Tokyo

  testpy:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: pytest -v --cov=app --cov-report=html --cov-report=term-missing
    volumes:
      - ..:/app
