name: Deploy to Hyper-V Ubuntu
# （Hyper-V Ubuntu へデプロイするワークフロー）

on:
  push:
    branches:
      - main
      # （main ブランチに push されたら実行）

jobs:
  deploy:
    runs-on: ubuntu-latest
    # （GitHub Actions の Ubuntu ランナーで実行）

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        # （リポジトリをチェックアウト）

      - name: Copy files to server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          source: "."
          target: "/opt/price-monitor"
        # （ローカルの全ファイルを /opt/price-monitor にコピー）

      - name: Restart Docker Compose on server
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            cd /opt/price-monitor
            docker compose down
            docker compose up -d --build
        # （Docker Compose を再起動して最新コードを反映）

