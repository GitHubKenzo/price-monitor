version: "3.9"

services:
  maintenance:
    build:
      context: ..
      dockerfile: maintenance/Dockerfile
    container_name: price-monitor-maintenance

    working_dir: /workspace

    environment:
      - TZ=Asia/Tokyo
      - DB_PATH=/workspace/data/price.db
      - PYTHONPATH=/workspace

    volumes:
      - ../app:/workspace/app
      - ../data:/workspace/data

    # ★ WSL は UID が readonly → UID_OVERRIDE を使う
    user: "${UID_OVERRIDE}:${GID_OVERRIDE}"

    tty: true
    stdin_open: true

    command: bash
